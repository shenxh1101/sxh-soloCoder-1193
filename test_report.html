<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翻唱歌曲项目清单</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        header h1 { font-size: 28px; margin-bottom: 8px; }
        header .subtitle { opacity: 0.9; font-size: 14px; }
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            flex: 1;
            min-width: 180px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .stat-card .label { font-size: 13px; color: #888; margin-bottom: 6px; }
        .stat-card .value { font-size: 24px; font-weight: 600; color: #333; }
        .songs-table {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: #f8f9fa;
            text-align: left;
            padding: 14px 16px;
            font-weight: 600;
            font-size: 13px;
            color: #555;
            border-bottom: 1px solid #eee;
        }
        td {
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: #fafafa; }
        .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            margin-right: 4px;
        }
        .tag-done { background: #d4edda; color: #155724; }
        .tag-mixing { background: #fff3cd; color: #856404; }
        .tag-tuning { background: #f8d7da; color: #721c24; }
        .song-title { font-weight: 600; color: #222; }
        .original-info { color: #888; font-size: 12px; margin-top: 2px; }
        .file-path {
            font-family: monospace;
            font-size: 12px;
            color: #666;
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .mix-count {
            display: inline-block;
            background: #e7f3ff;
            color: #0066cc;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 500;
        }
        footer {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>翻唱歌曲项目清单</h1>
            <p class="subtitle">生成时间：2026-06-12 02:05:21</p>
            
        </header>

        <div class="stats-bar">
            <div class="stat-card">
                <div class="label">歌曲数量</div>
                <div class="value">1 首</div>
            </div>
            <div class="stat-card">
                <div class="label">总时长</div>
                <div class="value">0:00</div>
            </div>
            <div class="stat-card">
                <div class="label">总大小</div>
                <div class="value">0 B</div>
            </div>
            <div class="stat-card">
                <div class="label">混音版本总数</div>
                <div class="value">0 个</div>
            </div>
        </div>

        <div class="songs-table">
            <table>
                <thead>
                    <tr>
                        <th>歌曲</th>
                        <th>标签</th>
                        <th>时长</th>
                        <th>文件大小</th>
                        <th>混音版本</th>
                        <th>干声</th>
                        <th>伴奏</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
        <td>
            <div class="song-title">测试歌曲</div>
            <div class="original-info">原唱：周杰伦 · 原曲：晴天</div>
        </td>
        <td><span class="tag tag-tuning">待修音</span></td>
        <td>未知</td>
        <td>未知</td>
        <td><span class="mix-count">0 个</span></td>
        <td><span style="color:#dc3545;">缺失</span></td>
        <td><span style="color:#dc3545;">缺失</span></td>
    </tr>
                </tbody>
            </table>
        </div>

        <footer>
            由 Cover Song Manager 生成
        </footer>
    </div>
</body>
</html>
